version: "3.8"

# Stack completa: Airflow Webserver + Scheduler + Postgres (metadata DB)
#
# Uso:
#   docker compose build          ← constrói a imagem com todas as dependências
#   docker compose up -d
#   Acesse: http://localhost:8080  (admin / admin)
#
# Na primeira vez ou após mudar o Dockerfile:
#   docker compose build --no-cache
#   docker compose up -d

x-airflow-common: &airflow-common
  build:
    context: ..
    dockerfile: docker/Dockerfile    # ← imagem customizada com pyspark + dbt
  environment:
    AIRFLOW__CORE__EXECUTOR:                    LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN:        postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__DAGS_FOLDER:                 /opt/airflow/dags
    AIRFLOW__CORE__LOAD_EXAMPLES:               "false"
    AIRFLOW__CORE__DEFAULT_TIMEZONE:            America/Sao_Paulo
    AIRFLOW__WEBSERVER__DEFAULT_UI_TIMEZONE:    America/Sao_Paulo
    PYTHONPATH:                                 /opt/project
    ECON_PROJECT_ROOT:                          /opt/project
    JAVA_HOME:                                  /usr/lib/jvm/java-17-openjdk-amd64
    PYSPARK_PYTHON:                             /home/airflow/.local/bin/python3
    PYSPARK_DRIVER_PYTHON:                      /home/airflow/.local/bin/python3
  volumes:
    - ../airflow/dags:/opt/airflow/dags
    - ../:/opt/project
    - airflow_logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER:     airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB:       airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create --username admin --password admin
          --firstname Admin --lastname User --role Admin --email admin@local.com
      "
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always

volumes:
  postgres_data:
  airflow_logs: