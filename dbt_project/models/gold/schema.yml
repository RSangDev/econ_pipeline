version: 2

models:
  - name: gld_painel_macro
    description: "Painel anual de indicadores macro — SELIC, IPCA, câmbio, PIB, desemprego"
    columns:
      - name: ano
        data_tests: [not_null, unique]

  - name: gld_serie_mensal
    description: "Série mensal de todos os indicadores com variação YoY"
    columns:
      - name: indicador
        data_tests: [not_null]
      - name: valor
        data_tests: [not_null]
      - name: tendencia
        data_tests:
          - accepted_values:
              arguments:
                values: ['alta', 'queda', 'estavel', 'sem_dado']

  - name: gld_correlacoes
    description: "Análise de correlação entre indicadores por ano"
    columns:
      - name: ano
        data_tests: [not_null, unique]
