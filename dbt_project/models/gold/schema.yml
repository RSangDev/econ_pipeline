version: 2

models:
  - name: gld_painel_macro
    description: "Painel anual de indicadores macro"
    columns:
      - name: ano
        data_tests: [not_null, unique]

  - name: gld_serie_mensal
    description: "Série mensal com variação YoY"
    columns:
      - name: indicador
        data_tests: [not_null]
      - name: valor
        data_tests: [not_null]
      - name: tendencia
        data_tests:
          - accepted_values:
              values: ['alta', 'queda', 'estavel', 'sem_dado']

  - name: gld_correlacoes
    description: "Correlação entre indicadores por ano"
    columns:
      - name: ano
        data_tests: [not_null, unique]